// 开发环境配置
ktor {
    deployment {
        port = 8080
        port = ${?SERVER_PORT}  // 环境变量可覆盖
        host = "0.0.0.0"
        host = ${?SERVER_HOST}  // 环境变量可覆盖
        watch = [classes, resources]  // 开发模式启用热重载
    }
    application {
        modules = [site.addzero.vibepocket.ApplicationKt.module]
    }
}

banner {
    text = "VIBEPOCKET [DEV]"
    subtitle = "Development Mode"
}

openapi {
    enabled = true
    path = "/swagger"
    spec = "openapi/documentation.yaml"
}

// 开发环境数据库（本地SQLite）
datasources {
    sqlite {
        enabled = true
        url = "jdbc:sqlite:vibepocket-dev.db"
        driver = "org.sqlite.SQLiteDriver"
    }
    postgres {
        enabled = false
    }
}

s3 {
    enabled = false  // 开发环境可禁用S3
}
