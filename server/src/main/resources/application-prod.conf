// 生产环境配置
ktor {
    deployment {
        port = 8080
        port = ${?SERVER_PORT}  // 环境变量可覆盖
        host = "0.0.0.0"
        host = ${?SERVER_HOST}  // 环境变量可覆盖
        // 生产环境禁用热重载
    }
    application {
        modules = [site.addzero.vibepocket.ApplicationKt.module]
    }
}

banner {
    text = "VIBEPOCKET [PROD]"
    subtitle = "Production Mode"
}

openapi {
    enabled = false  // 生产环境禁用Swagger
    path = "/swagger"
    spec = "openapi/documentation.yaml"
}

// 生产环境数据库（PostgreSQL）
datasources {
    sqlite {
        enabled = false
    }
    postgres {
        enabled = true
        url = ${?JDBC_DATABASE_URL}  // 从环境变量读取数据库URL
        driver = "org.postgresql.Driver"
    }
}

s3 {
    enabled = true
    endpoint = ${?S3_ENDPOINT}
    region = ${?S3_REGION}
    bucket = ${?S3_BUCKET}
    accessKey = ${?S3_ACCESS_KEY}
    secretKey = ${?S3_SECRET_KEY}
}
